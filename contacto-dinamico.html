<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Federico Magallanes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #F8F9FA;
            --text: #4A4A4A;
            --light-gray: #E0E0E0;
            --medium-gray: #9E9E9E;
            --dark-gray: #212121;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding-bottom: 100px;
        }
        
        /* Animación de partículas de fondo */
        .particle {
            position: absolute;
            background: linear-gradient(to right, rgba(42, 92, 130, 0.1), rgba(107, 78, 113, 0.1));
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0.5;
            z-index: -1;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
            color: var(--secondary);
        }

        .contact-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: var(--shadow);
        }

        .whatsapp-btn {
            background-color: #25D366;
            color: white;
        }

        .email-btn {
            background-color: #EA4335;
            color: white;
        }

        .instagram-btn {
            background: linear-gradient(45deg, #405DE6, #5851DB, #833AB4, #C13584, #E1306C, #FD1D1D);
            color: white;
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
        }

        .contact-btn i {
            font-size: 1.1rem;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: scale(1.7); opacity: 0; }
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 60px 5% 40px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .hero-image {
            margin-bottom: 30px;
        }

        .profile-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--light-gray);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .profile-photo:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            position: relative;
            display: inline-block;
        }

        .typewriter {
            overflow: hidden;
            border-right: 4px solid var(--accent);
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: 0.05em;
            animation: typing 2.5s steps(30, end), blink-caret 0.75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: var(--accent) }
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--dark-gray);
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Card de contacto */
        .contact-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto 40px;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid var(--light-gray);
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }

        @keyframes fadeInUp {
            from { 
                transform: translateY(20px);
                opacity: 0;
            }
            to { 
                transform: translateY(0);
                opacity: 1;
            }
        }

        .contact-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .contact-item:hover {
            transform: translateX(5px);
        }

        .contact-icon {
            width: 40px;
            height: 40px;
            background-color: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .contact-item:hover .contact-icon {
            background-color: var(--secondary);
            transform: scale(1.1);
        }

        .contact-text {
            flex-grow: 1;
            font-size: 1rem;
        }

        .contact-text a {
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .contact-text a:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

        /* Badges */
        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 30px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 1.2s forwards;
        }

        .badge {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .badge:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            color: var(--text);
            font-size: 0.9rem;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 1.5s forwards;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            header {
                padding: 15px 5%;
            }
            
            .contact-card {
                padding: 20px;
                margin: 0 auto 30px;
            }
            
            .contact-item {
                flex-direction: column;
                text-align: center;
                margin-bottom: 25px;
            }
            
            .contact-icon {
                margin-right: 0;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas de fondo -->
    <div class="particles"></div>
    
    <!-- Header -->
    <header>
        <div class="logo">FM.</div>
        <a href="https://wa.me/5493875370409" class="whatsapp-btn">
            <i class="fab fa-whatsapp"></i>
            WhatsApp
        </a>
    </header>
    
    <!-- Hero -->
    <section class="hero">
        <div class="hero-image">
            <img src="c:\Users\PC\OneDrive\Desktop\fede publi\Gemini_Generated_Image_6o94496o94496o94.png" alt="Federico Magallanes" class="profile-photo">
        </div>
        <h1><span class="typewriter">Federico Magallanes</span></h1>
        <p class="subtitle">Automatización IA + Meta Ads</p>
    </section>
    
    <!-- Tarjeta de contacto -->
    <div class="contact-card">
        <div class="contact-item">
            <div class="contact-icon">
                <i class="fas fa-envelope"></i>
            </div>
            <div class="contact-text">
                <p>Email profesional</p>
                <a href="mailto:federicomagallanes.ia@gmail.com">federicomagallanes.ia@gmail.com</a>
            </div>
        </div>
        
        <div class="contact-item">
            <div class="contact-icon">
                <i class="fab fa-whatsapp"></i>
            </div>
            <div class="contact-text">
                <p>WhatsApp directo</p>
                <a href="https://wa.me/5493875370409">+54 9 387 537-0409</a>

        </div>
        
        <div class="contact-item">
            <div class="contact-icon">
                <i class="fas fa-map-marker-alt"></i>

            <div class="contact-text">
                <p>Ubicación</p>
                <span>Salta, Argentina</span>
            </div>
        </div>
        
        <div class="contact-buttons">
            <a href="https://wa.me/5493875370409" class="contact-btn whatsapp-btn">
                <i class="fab fa-whatsapp"></i>

            </a>
            <a href="mailto:federicomagallanes.ia@gmail.com" class="contact-btn email-btn">

        </div>
    </div>
    
    <!-- Footer -->
    <footer>
        &copy; 2026 Federico Magallanes. Todos los derechos reservados.
    </footer>
    
    <script>
        // Generar partículas de fondo
        document.addEventListener('DOMContentLoaded', function() {
            const particlesContainer = document.querySelector('.particles');
            const particleCount = 12;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Posición y tamaño aleatorio
                const size = Math.random() * 150 + 50;
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                const delay = Math.random() * 10;
                
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${posX}%`;
                particle.style.top = `${posY}%`;
                particle.style.animationDelay = `${delay}s`;
                
                particlesContainer.appendChild(particle);
            }
            
            // Efecto parallax en la tarjeta
            const card = document.querySelector('.contact-card');
            window.addEventListener('mousemove', function(e) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 20;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 20;
                card.style.transform = `perspective(1000px) rotateX(${yAxis}deg) rotateY(${xAxis}deg) scale(1.02)`;
            });
            
            window.addEventListener('mouseout', function() {
                card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
            });
        });
    </script>
</body>
</html>
